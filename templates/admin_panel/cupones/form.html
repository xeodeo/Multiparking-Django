{% extends "admin_panel/base.html" %}
{% load l10n %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-6">
        <a href="{% url 'admin_cupones' %}" class="text-mp-muted hover:text-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </a>
        <h1 class="text-2xl font-bold">{{ title }}</h1>
    </div>

    <div class="bg-mp-card border border-mp-border rounded-xl p-6">
        <form method="POST">
            {% csrf_token %}

            <div class="space-y-6">
                <!-- Nombre de la promocion -->
                <div>
                    <label for="cupNombre" class="block text-sm font-medium text-mp-muted mb-2">Nombre de la Promocion <span class="text-red-400">*</span></label>
                    <input type="text" id="cupNombre" name="cupNombre" value="{{ cupon.cupNombre }}"
                        class="w-full bg-black/20 border border-mp-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-mp-purple focus:ring-1 focus:ring-mp-purple transition"
                        placeholder="Ej: Descuento Bienvenida" required maxlength="50">
                </div>

                <!-- Codigo y Tipo -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label for="cupCodigo" class="block text-sm font-medium text-mp-muted mb-2">
                            <span class="flex items-center gap-2">
                                Codigo del Cupon <span class="text-red-400">*</span>
                                <span class="text-xs text-yellow-400 bg-yellow-500/10 px-2 py-0.5 rounded-full border border-yellow-500/20">Unico</span>
                            </span>
                        </label>
                        <input type="text" id="cupCodigo" name="cupCodigo" value="{{ cupon.cupCodigo }}"
                            class="w-full bg-black/20 border border-mp-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-mp-purple focus:ring-1 focus:ring-mp-purple transition uppercase font-mono"
                            placeholder="Ej: BIENVENIDO20" required maxlength="20"
                            pattern="[A-Za-z0-9]+"
                            title="Solo letras y números, sin espacios ni caracteres especiales">
                        <p class="text-xs text-mp-muted mt-1">Este es el codigo que el cliente ingresa para aplicar el descuento</p>
                    </div>

                    <div>
                        <label for="cupTipo" class="block text-sm font-medium text-mp-muted mb-2">Tipo de
                            Descuento <span class="text-red-400">*</span></label>
                        <select id="cupTipo" name="cupTipo" required
                            class="w-full bg-black/20 border border-mp-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-mp-purple focus:ring-1 focus:ring-mp-purple transition appearance-none">
                            <option value="PORCENTAJE" {% if cupon.cupTipo == 'PORCENTAJE' %}selected{% endif %}>Porcentaje (%)</option>
                            <option value="VALOR_FIJO" {% if cupon.cupTipo == 'VALOR_FIJO' %}selected{% endif %}>Valor Fijo ($)</option>
                        </select>
                    </div>
                </div>

                <!-- Valor -->
                <div>
                    <label for="cupValor" class="block text-sm font-medium text-mp-muted mb-2">Valor del
                        Descuento <span class="text-red-400">*</span></label>
                    <input type="number" id="cupValor" name="cupValor" value="{{ cupon.cupValor|unlocalize }}" step="0.01" min="0"
                        class="w-full bg-black/20 border border-mp-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-mp-purple transition"
                        placeholder="Ej: 10 para 10% o 5000 para $5000" required>
                </div>

                <!-- Descripción -->
                <div>
                    <label for="cupDescripcion" class="block text-sm font-medium text-mp-muted mb-2">Descripción
                        (Opcional)</label>
                    <textarea id="cupDescripcion" name="cupDescripcion" rows="3"
                        class="w-full bg-black/20 border border-mp-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-mp-purple transition">{{ cupon.cupDescripcion }}</textarea>
                </div>

                <!-- Fechas -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label for="cupFechaInicio" class="block text-sm font-medium text-mp-muted mb-2">
                            <span class="flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                                Fecha Inicio <span class="text-red-400">*</span>
                            </span>
                        </label>
                        <input type="date" id="cupFechaInicio" name="cupFechaInicio"
                            value="{{ cupon.cupFechaInicio|date:'Y-m-d' }}"
                            class="w-full bg-black/20 border border-mp-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-mp-purple focus:ring-1 focus:ring-mp-purple transition cursor-pointer"
                            required>
                    </div>
                    <div>
                        <label for="cupFechaFin" class="block text-sm font-medium text-mp-muted mb-2">
                            <span class="flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                                Fecha Fin <span class="text-red-400">*</span>
                            </span>
                        </label>
                        <input type="date" id="cupFechaFin" name="cupFechaFin"
                            value="{{ cupon.cupFechaFin|date:'Y-m-d' }}"
                            class="w-full bg-black/20 border border-mp-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-mp-purple focus:ring-1 focus:ring-mp-purple transition cursor-pointer"
                            required>
                    </div>
                </div>

                <!-- Activo -->
                <div class="flex items-center gap-4">
                    <label for="cupActivo" class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="cupActivo" name="cupActivo" class="sr-only peer"
                            {% if cupon.cupActivo %}checked{% endif %}>
                        <div class="w-11 h-6 bg-gray-700 rounded-full peer peer-checked:bg-mp-purple transition-colors duration-300 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-transform after:duration-300 peer-checked:after:translate-x-5 after:shadow-md"></div>
                    </label>
                    <span class="text-sm font-medium text-white">Cupón Activo</span>
                </div>

                <div class="flex justify-end gap-4 pt-6 border-t border-mp-border">
                    <a href="{% url 'admin_cupones' %}"
                        class="px-5 py-2.5 border border-mp-border text-mp-muted hover:text-white hover:border-white/30 rounded-lg transition font-medium">
                        Cancelar
                    </a>
                    <button type="submit"
                        class="bg-mp-purple hover:bg-mp-purple-dark text-white px-6 py-2.5 rounded-lg transition font-medium shadow-lg shadow-purple-900/30 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        Guardar Cupón
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
(function(){
    const codigo = document.getElementById('cupCodigo');
    const valor = document.getElementById('cupValor');
    const fechaInicio = document.getElementById('cupFechaInicio');
    const fechaFin = document.getElementById('cupFechaFin');

    function addHint(el){
        const hint = document.createElement('p');
        hint.className = 'text-xs text-red-400 mt-1 hidden';
        el.parentNode.appendChild(hint);
        return hint;
    }

    // Codigo: solo letras y numeros
    const hintCodigo = addHint(codigo);
    codigo.addEventListener('input', function(){
        this.value = this.value.toUpperCase();
        const v = this.value;
        if (v && !/^[A-Z0-9]+$/.test(v)) {
            hintCodigo.textContent = 'Solo letras y números, sin espacios';
            hintCodigo.classList.remove('hidden');
            this.classList.add('border-red-500');
            this.classList.remove('border-mp-border');
        } else {
            hintCodigo.classList.add('hidden');
            this.classList.remove('border-red-500');
            this.classList.add('border-mp-border');
        }
    });

    // Valor: no negativo
    const hintValor = addHint(valor);
    valor.addEventListener('input', function(){
        const v = parseFloat(this.value);
        if (this.value !== '' && v < 0) {
            hintValor.textContent = 'El valor no puede ser negativo';
            hintValor.classList.remove('hidden');
            this.classList.add('border-red-500');
            this.classList.remove('border-mp-border');
        } else {
            hintValor.classList.add('hidden');
            this.classList.remove('border-red-500');
            this.classList.add('border-mp-border');
        }
    });

    // Fecha fin >= fecha inicio
    const hintFecha = addHint(fechaFin);
    fechaFin.addEventListener('change', function(){
        if (fechaInicio.value && this.value && this.value < fechaInicio.value) {
            hintFecha.textContent = 'La fecha fin debe ser posterior a la fecha inicio';
            hintFecha.classList.remove('hidden');
            this.classList.add('border-red-500');
            this.classList.remove('border-mp-border');
        } else {
            hintFecha.classList.add('hidden');
            this.classList.remove('border-red-500');
            this.classList.add('border-mp-border');
        }
    });
})();
</script>
{% endblock %}
